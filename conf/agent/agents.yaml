# Agent framework configuration
# See docs/SYSTEM_DESIGN.md for architecture details.

defaults:
  cwd: /home/zhenc/kernel_lab
  model: claude-sonnet-4-6
  permission_mode: acceptEdits
  max_turns: 50
  max_budget_usd: 5.0

monitor:
  idle_timeout: 1800           # 30 min — triggers Steward stuck check
  total_timeout: 7200          # 2 hours — triggers Steward time_limit review
  hard_limit: 43200            # 12 hours — unconditional kill
  check_interval: 60           # check every 1 min
  loop_threshold: 100          # same tool 100x in a row
  progress_check_interval: 600 # 10 min — periodic progress check

direction:
  gate:
    tools: [Write, Edit, Bash]
    watched_dirs:
      - ~/kernel_lab
      - ~/kernel_lab_kb
  pulse:
    file_write_tools: [Write, Edit]
    command_match_tool: Bash
    watched_dirs:
      - ~/kernel_lab
      - ~/kernel_lab_kb
    triggers:
      file_write:
        cooldown: 60
      compile:
        match: "exec.action=compile"
        cooldown: 60
      trial:
        match: "exec.action=trial"
        cooldown: 60
      profile:
        match: "exec.action=profile"
        cooldown: 60

steward:
  model: claude-sonnet-4-6
  max_tokens: 2000
  tools:
    builtin:
      - Read
      - Grep
      - Glob
      - Bash
    disallowed:
      - SendMessage
      - ToolSearch
      - AskUserQuestion
      - EnterPlanMode
      - NotebookEdit
  tool_rules:
    - tool: Bash
      allow: true
      constraint: "Read-only commands for research. No file modification, no process management."
    - tool: Write
      allow: false
    - tool: Edit
      allow: false

storage:
  kb_root: ~/kernel_lab_kb
  log_dir: ~/.kernel_lab/logs
  max_sessions: 200
  # run_tag: auto-detected from host, or set by Supervisor
  # journal goes to: ~/kernel_lab_kb/runs/<run_tag>/journal/

agents:
  solver:
    description: "生成和修改 kernel 代码"
    model: claude-sonnet-4-6
    permission_mode: acceptEdits
    max_turns: 2000
    max_budget_usd: 50.0
    tools:
      builtin:
        - Read
        - Edit
        - Write
        - Bash
        - Glob
        - Grep
        - WebSearch
        - WebFetch
      custom:
        - ask_supervisor
        - request_formal_bench
        - submit_bench_reflection
        - set_direction
        - start_exploring
    tool_rules:
      - tool: Bash
        allow: true
        constraint: |
          允许: ik:exec (compile/trial/profile), ik:docs (find/read/browse), ik:optimize,
          所有 CUDA Toolkit 工具 (nvcc, ptxas, cuobjdump, nvdisasm, ncu, nsys, cuda-gdb,
          compute-sanitizer, cuda-memcheck, nvprof, nvprune, cu++filt 等全部允许),
          ssh localhost (用于网络访问), curl/wget (下载文档/资料)
          禁止: ik:bench, ik:env, ik:index — 这些由 Supervisor 管理
          禁止: 通过 Bash 编辑或写入 ~/kernel_lab_kb/runs/<run_tag>/ 和 ~/.cuda_exec/<run_tag>/ 之外的任何文件
          禁止: 修改 CUDA_VISIBLE_DEVICES 环境变量 — GPU 分配由 Supervisor 管理
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/
          - ~/kernel_lab_kb/runs/<run_tag>/peak/
          - ~/.claude/worktrees/
          - ~/.claude/projects/
          - ~/.cuda_exec/
          - ~/.cuda_exec_bench/
        allowed_paths:
          - ~/kernel_lab/.venv/
          - ~/kernel_lab/cuda_exec/
          - ~/kernel_lab/plugins/
          - ~/kernel_lab/conf/
          - ~/kernel_lab/data/ref/
          - ~/kernel_lab/data/sample/
          - ~/kernel_lab/data/configs/
          - ~/kernel_lab/data/roofline/
          - ~/kernel_lab/DESIGN.md
          - ~/kernel_lab/AGENTS.md
          - ~/kernel_lab_kb/runs/<run_tag>/
          - ~/.cuda_exec/<run_tag>/
      - tool: Edit
        allow: true
        constraint: "允许编辑 ~/kernel_lab_kb/runs/<run_tag>/、/tmp/"
      - tool: Write
        allow: true
        constraint: "允许写入 ~/kernel_lab_kb/runs/<run_tag>/、/tmp/"
      - tool: Read
        allow: true
        constraint: "只允许读白名单中的路径"
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/
          - ~/kernel_lab_kb/runs/<run_tag>/peak/
          - ~/.claude/worktrees/
          - ~/.claude/projects/
          - ~/.cuda_exec/
          - ~/.cuda_exec_bench/
        allowed_paths:
          # 相对路径
          - cuda_exec/
          - plugins/
          - conf/
          - data/ref/
          - data/sample/
          - data/configs/
          - data/roofline/
          - DESIGN.md
          - AGENTS.md
          # 绝对路径
          - ~/kernel_lab/cuda_exec/
          - ~/kernel_lab/plugins/
          - ~/kernel_lab/conf/
          - ~/kernel_lab/data/ref/
          - ~/kernel_lab/data/sample/
          - ~/kernel_lab/data/configs/
          - ~/kernel_lab/data/roofline/
          - ~/kernel_lab/DESIGN.md
          - ~/kernel_lab/AGENTS.md
          - ~/kernel_lab_kb/runs/<run_tag>/
          - ~/.cuda_exec/<run_tag>/
      - tool: Glob
        allow: true
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/
          - ~/kernel_lab_kb/runs/<run_tag>/peak/
          - ~/.claude/worktrees/
          - ~/.claude/projects/
          - ~/.cuda_exec/
          - ~/.cuda_exec_bench/
        allowed_paths:
          - cuda_exec/
          - plugins/
          - conf/
          - data/ref/
          - data/sample/
          - data/configs/
          - ~/kernel_lab/cuda_exec/
          - ~/kernel_lab/plugins/
          - ~/kernel_lab/conf/
          - ~/kernel_lab/data/ref/
          - ~/kernel_lab/data/sample/
          - ~/kernel_lab/data/configs/
          - ~/kernel_lab_kb/runs/<run_tag>/
          - ~/.cuda_exec/<run_tag>/
      - tool: Grep
        allow: true
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/
          - ~/kernel_lab_kb/runs/<run_tag>/peak/
          - ~/.claude/worktrees/
          - ~/.claude/projects/
          - ~/.cuda_exec/
          - ~/.cuda_exec_bench/
        allowed_paths:
          - cuda_exec/
          - plugins/
          - conf/
          - data/ref/
          - data/sample/
          - data/configs/
          - ~/kernel_lab/cuda_exec/
          - ~/kernel_lab/plugins/
          - ~/kernel_lab/conf/
          - ~/kernel_lab/data/ref/
          - ~/kernel_lab/data/sample/
          - ~/kernel_lab/data/configs/
          - ~/kernel_lab_kb/runs/<run_tag>/
          - ~/.cuda_exec/<run_tag>/
    system_prompt_file: prompts/solver.md

  rigger:
    description: "Harness Engineering — 修改 configs, reference impls, cuda_exec 基础设施"
    permission_mode: acceptEdits
    max_turns: 500
    max_budget_usd: 10.0
    tools:
      builtin:
        - Read
        - Edit
        - Write
        - Bash
        - Glob
        - Grep
      custom:
        - ask_supervisor
    tool_rules:
      - tool: Edit
        allow: true
        constraint: "允许编辑 data/configs/, data/ref/, data/sample/, cuda_exec/, plugins/ik/"
      - tool: Write
        allow: true
        constraint: "允许写入 data/configs/, data/ref/, data/sample/, cuda_exec/, plugins/ik/"
      - tool: Bash
        allow: true
        constraint: |
          允许: 运行测试 (pytest), ik:exec (验证 harness 改动), ik:docs,
          CUDA Toolkit 工具, ssh localhost, Python 脚本
          禁止: ik:bench (由 Supervisor 管理), ik:env, ik:index
          禁止: 修改 CUDA_VISIBLE_DEVICES 环境变量
    system_prompt_file: prompts/rigger.md

  benchmarker:
    description: "运行 ik:bench 正式 benchmark，只读评测"
    permission_mode: acceptEdits
    max_turns: 20
    max_budget_usd: 5.0
    tools:
      builtin:
        - Bash
        - Read
        - Glob
        - Grep
      custom: []
    tool_rules:
      - tool: Bash
        allow: true
        constraint: "仅允许运行 .venv/bin/python -m cuda_exec.formal bench.kernel=... 命令，不允许其他命令"
      - tool: Edit
        allow: false
      - tool: Write
        allow: false
    system_prompt_file: prompts/benchmarker.md

  # ── Library System Agents ──

  librarian:
    description: "Knowledge base arbiter — reads proposals, consults experts, writes canonical wiki"
    model: claude-sonnet-4-6
    permission_mode: acceptEdits
    max_turns: 200
    max_budget_usd: 10.0
    tools:
      builtin:
        - Read
        - Edit
        - Write
        - Glob
        - Grep
      custom:
        - consult_taxonomist
        - consult_auditor
    tool_rules:
      - tool: Write
        allow: true
        constraint: "Write to canonical wiki only — NOT _proposals/"
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/runs/
          - ~/kernel_lab_kb/wiki/_proposals/
        allowed_paths:
          - ~/kernel_lab_kb/wiki/
      - tool: Edit
        allow: true
        constraint: "Edit canonical wiki pages only — NOT _proposals/"
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/runs/
          - ~/kernel_lab_kb/wiki/_proposals/
        allowed_paths:
          - ~/kernel_lab_kb/wiki/
      - tool: Read
        allow: true
        blocked_paths:
          - ~/kernel_lab/
      - tool: Glob
        allow: true
        blocked_paths:
          - ~/kernel_lab/
      - tool: Grep
        allow: true
        blocked_paths:
          - ~/kernel_lab/
    system_prompt_file: prompts/librarian.md

  information_analyst:
    description: "Extract knowledge from reflections, produce proposals"
    model: claude-sonnet-4-6
    permission_mode: acceptEdits
    max_turns: 100
    max_budget_usd: 5.0
    tools:
      builtin:
        - Read
        - Write
        - Edit
        - Glob
        - Grep
    tool_rules:
      - tool: Write
        allow: true
        constraint: "Only write to _proposals/pending/"
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/
        allowed_paths:
          - ~/kernel_lab_kb/wiki/_proposals/pending/
      - tool: Edit
        allow: true
        constraint: "Only edit files in _proposals/pending/"
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/
        allowed_paths:
          - ~/kernel_lab_kb/wiki/_proposals/pending/
      - tool: Read
        allow: true
        blocked_paths:
          - ~/kernel_lab/
      - tool: Glob
        allow: true
        blocked_paths:
          - ~/kernel_lab/
      - tool: Grep
        allow: true
        blocked_paths:
          - ~/kernel_lab/
    system_prompt_file: prompts/analyst.md

  taxonomist:
    description: "Structure and classification advisor (read-only)"
    model: claude-sonnet-4-6
    max_turns: 20
    max_budget_usd: 2.0
    tools:
      builtin:
        - Read
        - Glob
        - Grep
    tool_rules:
      - tool: Read
        allow: true
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/runs/
        allowed_paths:
          - ~/kernel_lab_kb/wiki/
      - tool: Glob
        allow: true
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/runs/
        allowed_paths:
          - ~/kernel_lab_kb/wiki/
      - tool: Grep
        allow: true
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/runs/
        allowed_paths:
          - ~/kernel_lab_kb/wiki/
    system_prompt_file: prompts/taxonomist.md

  auditor:
    description: "Evidence validation and conflict detection (read-only)"
    model: claude-sonnet-4-6
    max_turns: 20
    max_budget_usd: 2.0
    tools:
      builtin:
        - Read
        - Glob
        - Grep
    tool_rules:
      - tool: Read
        allow: true
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/runs/
        allowed_paths:
          - ~/kernel_lab_kb/wiki/
      - tool: Glob
        allow: true
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/runs/
        allowed_paths:
          - ~/kernel_lab_kb/wiki/
      - tool: Grep
        allow: true
        blocked_paths:
          - ~/kernel_lab/
          - ~/kernel_lab_kb/runs/
        allowed_paths:
          - ~/kernel_lab_kb/wiki/
    system_prompt_file: prompts/auditor.md

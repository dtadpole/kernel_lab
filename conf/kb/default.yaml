# KB embedding service configuration.
#
# Service-specific settings only. Host inventory and GPU assignments
# live in conf/hosts/default.yaml (the deployment map).
#
# Python-based embedding server running Qwen3-Embedding-4B on a remote
# GPU host. Exposes an OpenAI-compatible /v1/embeddings endpoint
# consumed by doc_retrieval for dense and hybrid search.

service_defaults:
  service_name: "kb-embed"
  service_dir: ".kb_embed_service"
  model_id: "Qwen/Qwen3-Embedding-4B"
  model_cache_dir: ".cache/huggingface"

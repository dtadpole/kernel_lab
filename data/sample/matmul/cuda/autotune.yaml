# Per-config autotune for sample WGMMA matmul kernel.
#
# Tunable: TILE_N (N-tile width, multiple of 64), STAGES (pipeline depth).
# Fixed: TILE_M=128, TILE_K=64 (WGMMA constraints).
#
# Configs not listed use kernel defaults (TILE_N=128, STAGES=4).

configs:
  mat-256x256:
    autotune:
      params:
        TILE_N: [64, 128]
        STAGES: [2, 3, 4]
  mat-512x512:
    autotune:
      params:
        TILE_N: [64, 128, 256]
        STAGES: [2, 3, 4]
  mat-1024x1024:
    autotune:
      params:
        TILE_N: [128, 256]
        STAGES: [2, 3, 4]
  # mat-2048+: no autotune, use defaults (TILE_N=128, STAGES=4)

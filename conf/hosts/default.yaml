# GPU host inventory, environment, and service deployment map.
#
# This is the single source of truth for:
#   1. Hardware — SSH targets, GPU specs, network topology
#   2. Environment — CUDA toolkit, driver, Python, runtime workarounds
#   3. Deployment map — which service runs on which host:GPU
#
# Each host has:
#   hardware  — immutable facts about the machine (GPU, network)
#   env       — CUDA/Python/runtime settings for venv creation and kernel compilation
#   network   — connectivity constraints (proxy, pip reachability)
#   services  — what's deployed where, including GPU pin
#
# --- Network topology ---
#   _one/_two are behind 1and1 (66.179.249.233) with port forwarding.
#     _one: internet-visible port range 41000-41999
#     _two: internet-visible port range 42000-42999
#     SSH ports: _one=41922, _two=42922
#     Service ports must be within the host's internet-visible range.
#   h8_3/h8_4 are directly accessible Meta devvms (no gateway).
#
# --- Internet access ---
#   _one/_two: full internet (direct)
#   h8_3: full internet via fwdproxy
#   h8_4: NO internet — fwdproxy blocks CONNECT tunnels.
#         Deploy via rsync from h8_3 (venvs + HF model cache).
#         kb_embed systemd unit must set HF_HUB_OFFLINE=1.
#
# --- SSH alias availability ---
#   _one/_two SSH aliases are in personal ~/.ssh/config only,
#   not resolvable from Meta devvms.
#
# --- Shared-devvm port conflicts ---
#   Check port availability before deploying: sudo ss -tlnp | grep <port>
#
# --- fbcode libcuda workaround ---
#   Meta devvms ship /usr/local/fbcode/platform010/lib/libcuda.so which
#   may shadow the real system driver. When the fbcode version is older
#   than the system driver, set env.ld_preload to force the correct one.
#   Symptom: PyTorch reports "driver too old" despite nvidia-smi showing
#   the correct version.

hosts:
  _one:
    ssh_host: "_one"
    hardware:
      gpu: "RTX PRO 6000 Blackwell"
      gpu_count: 1
      driver_version: null          # TODO: verify from personal machine
      driver_cuda_version: null     # TODO: verify
      internet_host: "66.179.249.233"
      internet_port_range: "41000-41999"
    env:
      cuda_home: null               # TODO: verify
      cuda_available: []            # TODO: verify
      torch_cuda: null              # TODO: e.g. "cu130"
      torch_cuda_arch: "10.0"      # Blackwell = sm_100
      ld_preload: null              # likely not needed (non-Meta host)
      python: null                  # TODO: verify
    network:
      internet: true
      proxy_bypass_method: null     # direct internet
      pypi_nvidia_blocked: false
    services:
      cuda_exec:
        port: 41980
      kb_embed:
        port: 46982

  _two:
    ssh_host: "_two"
    hardware:
      gpu: "RTX PRO 6000 Blackwell"
      gpu_count: 1
      driver_version: null          # TODO: verify from personal machine
      driver_cuda_version: null     # TODO: verify
      internet_host: "66.179.249.233"
      internet_port_range: "42000-42999"
    env:
      cuda_home: null               # TODO: verify
      cuda_available: []            # TODO: verify
      torch_cuda: null              # TODO: e.g. "cu130"
      torch_cuda_arch: "10.0"      # Blackwell = sm_100
      ld_preload: null              # likely not needed (non-Meta host)
      python: null                  # TODO: verify
    network:
      internet: true
      proxy_bypass_method: null     # direct internet
      pypi_nvidia_blocked: false
    services:
      cuda_exec:
        port: 42980

  h8_3:
    ssh_host: "devvm8490.cco0.facebook.com"
    hardware:
      gpu: "NVIDIA H100"
      gpu_count: 8
      gpu_variant: "SXM R&R SKU 96GB"
      driver_version: "595.45.04"
      driver_cuda_version: "13.2"   # max CUDA version this driver supports
      # R&R SKU roofline at 650W TDP (see docs/roofline/h100_sxm.md)
      peak_tflops_bf16: 800         # BF16 Tensor Core (rated at 650W, not 989 @ 700W)
      peak_tflops_fp16: 800         # FP16 Tensor Core
      peak_tflops_fp32: 53.7        # FP32 CUDA Core (scaled from 66.9 * 800/989)
      peak_bandwidth_gb_s: 2447     # HBM3, 6144-bit bus @ 1593 MHz
    env:
      cuda_home: /usr/local/cuda-13.2
      cuda_available: ["12.8", "12.9", "13.0", "13.2"]
      torch_cuda: "cu132"
      torch_cuda_arch: "9.0"       # Hopper = sm_90 / sm_90a
      ld_preload: null              # not needed — driver 595 matches CUDA 13.2
      python: /usr/local/bin/python3  # 3.12.13+meta
      cudnn_sdpa_broken: false
      # CuTe DSL (FA4 ref-cutedsl) requires this due to ABI mismatch with PyTorch
      tvm_ffi_disable_torch_c_dlpack: true
      cutlass_include:
        - /home/zhenc/workspace1/third-party/cutlass/4.3.5/include
        - /home/zhenc/workspace1/third-party/cutlass/4.3.5/tools/util/include
    network:
      internet: true
      proxy_bypass_method: "fwdproxy"
      pypi_nvidia_blocked: false
    services:
      cuda_exec:
        port: 8980
        cuda_visible_devices: "7"
      kb_embed:
        port: 46983
        cuda_visible_devices: "6"
    benchmark:
      cuda_visible_devices: "4,5"

  h8_4:
    ssh_host: "devvm8491.cco0.facebook.com"
    hardware:
      gpu: "NVIDIA H100"
      gpu_count: 8
      gpu_variant: "SXM R&R SKU 96GB"
      driver_version: "595.45.04"
      driver_cuda_version: "13.2"   # max CUDA version this driver supports
      # R&R SKU roofline at 650W TDP (see docs/roofline/h100_sxm.md)
      peak_tflops_bf16: 800
      peak_tflops_fp16: 800
      peak_tflops_fp32: 53.7
      peak_bandwidth_gb_s: 2447
    env:
      cuda_home: /usr/local/cuda-13.2
      cuda_available: ["12.8", "12.9", "13.0", "13.2"]
      torch_cuda: "cu130"           # PyTorch cu130 works with driver 595
      torch_cuda_arch: "9.0"       # Hopper = sm_90
      ld_preload: null              # driver 595 matches — no workaround needed
      python: /usr/local/bin/python3  # 3.12.13+meta
      cudnn_sdpa_broken: false      # driver 595 fixes cuDNN 9.19 segfault
      tvm_ffi_disable_torch_c_dlpack: true
      cudnn_include:
        - "@venv/nvidia/cudnn/include"
        - "@uv_cache/include"
      cudnn_lib: "@venv/nvidia/cudnn/lib"
    network:
      internet: false               # fwdproxy blocks CONNECT tunnels
      proxy_bypass_method: "ssh_localhost"  # for Claude Code sandbox
      pypi_nvidia_blocked: true
    services:
      cuda_exec:
        port: 8980
        cuda_visible_devices: "7"
      kb_embed:
        port: 46984
        cuda_visible_devices: "6"
    benchmark:
      cuda_visible_devices: "4,5"

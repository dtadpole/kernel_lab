# Per-config autotune for sample WMMA matmul kernel.
#
# Tunable: BM, BN (CTA tile sizes), BK (K-tile, multiple of 16).

configs:
  mat-256x256:
    autotune:
      params:
        BM: [64, 128]
        BN: [64, 128]
        BK: [32, 64]
  mat-512x512:
    autotune:
      params:
        BM: [64, 128]
        BN: [64, 128]
        BK: [32, 64]
  mat-1024x1024:
    autotune:
      params:
        BM: [128, 256]
        BN: [128, 256]
        BK: [32, 64]
  # mat-2048+: no autotune, use defaults (BM=128, BN=128, BK=64)

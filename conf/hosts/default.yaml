# GPU host inventory and service deployment map.
#
# This is the single source of truth for:
#   1. Hardware — SSH targets, GPU specs, network topology
#   2. Deployment map — which service runs on which host:GPU
#
# Each host has a `hardware` section (immutable facts about the machine)
# and a `services` section (what's deployed where, including GPU pin).
#
# Network topology:
#   _one/_two are behind 1and1 (66.179.249.233) with port forwarding.
#     _one: internet-visible port range 41000-41999
#     _two: internet-visible port range 42000-42999
#     SSH ports: _one=41922, _two=42922
#     Service ports must be within the host's internet-visible range.
#   h8_3/h8_4 are directly accessible Meta devvms (no gateway).

hosts:
  _one:
    ssh_host: "_one"
    hardware:
      gpu: "RTX PRO 6000 Blackwell"
      gpu_count: 1
      internet_host: "66.179.249.233"
      internet_port_range: "41000-41999"
    services:
      cuda_exec:
        port: 41980
      kb_embed:
        port: 46982

